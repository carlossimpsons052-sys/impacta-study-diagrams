<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Defesa em Profundidade</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const SIZE = 620;
    const CX = SIZE / 2;
    const CY = SIZE / 2;

    const layers = [
      {
        id: 1, name: "Banco de Dados", short: "O dado mora aqui", icon: "🗄️",
        color: "#166534", glow: "#86EFAC", r: 40,
        protects: "Os dados em repouso",
        description: "O centro. O dado mora aqui. Banco não exposto diretamente na internet, acesso restrito, senha forte, dados sensíveis criptografados em repouso. Se essa camada cair, o impacto é máximo.",
        example: "Ex: acesso só via app server, nunca direto pela internet pública",
        resources: [
          { type: "▶ YouTube", label: "NetworkChuck — SQL Injection Attack Demo", url: "https://www.youtube.com/watch?v=_gOuBb7pEXo" },
          { type: "📘 OWASP",  label: "OWASP — Database Security Cheat Sheet",   url: "https://cheatsheetseries.owasp.org/cheatsheets/Database_Security_Cheat_Sheet.html" },
          { type: "📄 Artigo", label: "AWS — RDS Security Best Practices",        url: "https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/CHAP_BestPractices.Security.html" },
          { type: "📄 Artigo", label: "PostgreSQL — Security Documentation",      url: "https://www.postgresql.org/docs/current/security.html" },
        ],
      },
      {
        id: 2, name: "Aplicação", short: "Código seguro", icon: "⚙️",
        color: "#B91C1C", glow: "#FCA5A5", r: 80,
        protects: "Lógica e código da aplicação",
        description: "É o código que você escreve. SAST detecta vulnerabilidades no código estático. SCA detecta vulnerabilidades nas dependências. Aqui o dev tem controle total — e responsabilidade total.",
        example: "Ex: sem SQL Injection, sem secrets no código, libs atualizadas",
        resources: [
          { type: "▶ YouTube", label: "Fireship — 10 Hacking Techniques",     url: "https://www.youtube.com/watch?v=dT3UqCpAFuQ" },
          { type: "📘 OWASP",  label: "OWASP — Top 10 Web Application Risks", url: "https://owasp.org/www-project-top-ten/" },
          { type: "🛠 Tool",   label: "Snyk — SAST & SCA na IDE",             url: "https://snyk.io/learn/application-security/sast-vs-dast/" },
          { type: "📘 OWASP",  label: "OWASP — Secure Coding Practices Guide",url: "https://owasp.org/www-project-secure-coding-practices-quick-reference-guide/" },
        ],
      },
      {
        id: 3, name: "API Gateway", short: "Porteiro das APIs", icon: "🚪",
        color: "#B45309", glow: "#FCD34D", r: 122,
        protects: "Controle de acesso às APIs",
        description: "Toda requisição passa pelo Gateway antes de chegar no backend. Valida token, aplica rate limiting, roteia para o serviço correto e rejeita o que não está autorizado.",
        example: "Ex: AWS API Gateway, Kong, Apigee",
        resources: [
          { type: "▶ YouTube", label: "IBM Technology — API Gateway Explained", url: "https://www.youtube.com/watch?v=vgQAToYjkX8" },
          { type: "📘 OWASP",  label: "OWASP — API Security Top 10",           url: "https://owasp.org/www-project-api-security/" },
          { type: "📄 Artigo", label: "AWS — What is an API Gateway?",         url: "https://aws.amazon.com/api-gateway/resources/" },
          { type: "🛠 Tool",   label: "Kong — Open Source API Gateway",        url: "https://docs.konghq.com/gateway/latest/" },
        ],
      },
      {
        id: 4, name: "Identity Provider", short: "Gerencia quem é quem", icon: "🪪",
        color: "#0F766E", glow: "#2DD4BF", r: 164,
        protects: "Identidade e autenticação",
        description: "Sistema centralizado que gerencia autenticação. Todas as apps delegam login para o IdP. Cuida de MFA, SSO, expiração de sessão e políticas de senha — nenhuma app precisa reinventar o login.",
        example: "Ex: Okta, Auth0, Keycloak — o 'Entrar com Google' é um IdP",
        resources: [
          { type: "▶ YouTube", label: "Fireship — OAuth & OpenID Connect",      url: "https://www.youtube.com/watch?v=996OiexHze0" },
          { type: "📘 OWASP",  label: "OWASP — Authentication Cheat Sheet",     url: "https://cheatsheetseries.owasp.org/cheatsheets/Authentication_Cheat_Sheet.html" },
          { type: "📄 Artigo", label: "Auth0 — What is an Identity Provider?",  url: "https://auth0.com/docs/authenticate/identity-providers" },
          { type: "🛠 Tool",   label: "Keycloak — Open Source IdP (docs)",      url: "https://www.keycloak.org/documentation" },
        ],
      },
      {
        id: 5, name: "WAF", short: "Filtra requisições HTTP", icon: "🛡️",
        color: "#0369A1", glow: "#38BDF8", r: 206,
        protects: "Ataques na camada HTTP",
        description: "Web Application Firewall entende HTTP — diferente do firewall de rede que só vê IP e porta. Lê o conteúdo da requisição e bloqueia padrões de ataque antes de chegarem na aplicação.",
        example: "Ex: ' OR 1=1 -- na URL → WAF bloqueia antes de chegar no backend",
        resources: [
          { type: "▶ YouTube", label: "IBM Technology — WAF Explained",      url: "https://www.youtube.com/watch?v=p8CQcF_9280" },
          { type: "📘 OWASP",  label: "OWASP — WAF Evaluation Criteria",     url: "https://owasp.org/www-project-web-application-firewall-evaluation-criteria/" },
          { type: "📄 Artigo", label: "Cloudflare — What is a WAF?",         url: "https://www.cloudflare.com/learning/ddos/glossary/web-application-firewall-waf/" },
          { type: "🛠 Tool",   label: "AWS WAF — Getting Started",           url: "https://docs.aws.amazon.com/waf/latest/developerguide/getting-started.html" },
        ],
      },
      {
        id: 6, name: "SIEM / SOAR", short: "Detecta e responde", icon: "📡",
        color: "#7C3AED", glow: "#A78BFA", r: 248,
        protects: "Visibilidade e resposta a incidentes",
        description: "SIEM coleta logs de todas as camadas e detecta padrões de ataque por correlação de eventos. SOAR automatiza a resposta: bloqueia IP, abre ticket, notifica o time — sem intervenção humana.",
        example: "Ex: 500 tentativas de login em 10s → IP bloqueado automaticamente",
        resources: [
          { type: "▶ YouTube", label: "IBM Technology — What is SIEM?",      url: "https://www.youtube.com/watch?v=VhM3bKsTa9E" },
          { type: "▶ YouTube", label: "John Hammond — SOC & SIEM na prática",url: "https://www.youtube.com/watch?v=RMBQVUlEhYM" },
          { type: "📄 Artigo", label: "Microsoft — What is SIEM?",           url: "https://azure.microsoft.com/en-us/resources/cloud-computing-dictionary/what-is-siem" },
          { type: "🛠 Tool",   label: "Splunk — SIEM Platform (docs)",       url: "https://docs.splunk.com/Documentation/Splunk" },
        ],
      },
      {
        id: 7, name: "Backup", short: "Último recurso", icon: "💾",
        color: "#4B5563", glow: "#9CA3AF", r: 290,
        protects: "Recuperação pós-incidente",
        description: "Quando tudo falhou, o backup é o que permite recuperar. Ransomware, desastre, falha total — sem backup íntegro e testado, não há recuperação. A pergunta real não é 'temos backup?' mas 'quanto tempo para restaurar?'",
        example: "Ex: snapshots diários do banco, restore testado mensalmente",
        resources: [
          { type: "▶ YouTube", label: "NetworkChuck — Backup Strategy (3-2-1 Rule)", url: "https://www.youtube.com/watch?v=S0KZ5iXTkzg" },
          { type: "📄 Artigo", label: "NIST — Contingency Planning Guide SP 800-34", url: "https://csrc.nist.gov/publications/detail/sp/800-34/rev-1/final" },
          { type: "📄 Artigo", label: "AWS — Backup Best Practices",                 url: "https://docs.aws.amazon.com/aws-backup/latest/devguide/best-practices.html" },
          { type: "📘 OWASP",  label: "OWASP — Business Continuity Testing",         url: "https://owasp.org/www-project-web-security-testing-guide/" },
        ],
      },
    ];

    const TC = {
      "▶ YouTube": { bg: "#450A0A", border: "#F87171", text: "#FCA5A5" },
      "📘 OWASP":  { bg: "#0C1A2E", border: "#3B82F6", text: "#93C5FD" },
      "📄 Artigo": { bg: "#0A1F0A", border: "#4ADE80", text: "#86EFAC" },
      "🛠 Tool":   { bg: "#1A0A2E", border: "#A78BFA", text: "#C4B5FD" },
    };

    function layerFromEvent(e) {
      const rect = e.currentTarget.getBoundingClientRect();
      const scaleX = SIZE / rect.width;
      const scaleY = SIZE / rect.height;
      const x = (e.clientX - rect.left) * scaleX - CX;
      const y = (e.clientY - rect.top)  * scaleY - CY;
      const dist = Math.sqrt(x * x + y * y);
      return layers.find((l) => dist <= l.r) || null;
    }

    function App() {
      const [active, setActive]   = useState(null);
      const [hovered, setHovered] = useState(null);
      const al = layers.find((l) => l.id === active);

      function handleSvgClick(e) {
        const l = layerFromEvent(e);
        if (!l) return;
        setActive((prev) => (prev === l.id ? null : l.id));
      }
      function handleSvgMove(e) {
        const l = layerFromEvent(e);
        setHovered(l ? l.id : null);
      }

      return (
        <div style={{ minHeight: "100vh", background: "#080810", fontFamily: "'Courier New', monospace", display: "flex", flexDirection: "column", alignItems: "center", padding: "24px 12px 32px", boxSizing: "border-box" }}>
          <div style={{ textAlign: "center", marginBottom: 14 }}>
            <div style={{ fontSize: 9, letterSpacing: "0.3em", color: "#1F2937", textTransform: "uppercase", marginBottom: 4 }}>Secure Development · Módulo 2 · Aula 1</div>
            <h1 style={{ fontSize: 20, color: "#F9FAFB", fontWeight: 700, letterSpacing: "0.06em", margin: 0 }}>DEFESA EM PROFUNDIDADE</h1>
            <div style={{ fontSize: 10, color: "#374151", marginTop: 4 }}>Clique em cada anel → descrição + links de estudo</div>
          </div>

          <div style={{ display: "flex", flexDirection: "row", alignItems: "flex-start", gap: 20, flexWrap: "wrap", justifyContent: "center" }}>
            <svg viewBox={`0 0 ${SIZE} ${SIZE}`} style={{ width: SIZE, maxWidth: "100vw", height: "auto", cursor: "pointer", flexShrink: 0 }}
              onClick={handleSvgClick} onMouseMove={handleSvgMove} onMouseLeave={() => setHovered(null)}>
              <defs>
                {layers.map((l) => (
                  <filter key={l.id} id={`g${l.id}`} x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="8" result="b" />
                    <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
                  </filter>
                ))}
              </defs>
              {[...layers].reverse().map((l) => {
                const hi = active === l.id || hovered === l.id;
                return <circle key={l.id} cx={CX} cy={CY} r={l.r} fill={l.color} fillOpacity={hi ? 0.4 : 0.13} stroke={l.glow} strokeWidth={hi ? 2.5 : 0.9} strokeOpacity={hi ? 1 : 0.35} filter={hi ? `url(#g${l.id})` : undefined} style={{ pointerEvents: "none", transition: "all 0.2s" }} />;
              })}
              {layers.map((l) => {
                const hi = active === l.id || hovered === l.id;
                const prev = layers.find((x) => x.id === l.id - 1);
                const midR = prev ? (l.r + prev.r) / 2 : l.r / 2;
                const ly = CY - midR;
                return (
                  <g key={`lb${l.id}`} style={{ pointerEvents: "none" }}>
                    <text x={CX} y={ly - 4} textAnchor="middle" fontSize={hi ? 12 : 10} fontWeight={hi ? "700" : "400"} fill={hi ? l.glow : "#9CA3AF"} fontFamily="'Courier New', monospace">{l.icon} {l.name}</text>
                    <text x={CX} y={ly + 9} textAnchor="middle" fontSize={7.5} fill={hi ? l.glow + "BB" : "#374151"} fontFamily="'Courier New', monospace">{l.short}</text>
                  </g>
                );
              })}
              <text x={CX} y={CY + 4} textAnchor="middle" fontSize={9} fill="#86EFAC" fontWeight="700" fontFamily="'Courier New', monospace" style={{ pointerEvents: "none" }}>DADO</text>
            </svg>

            <div style={{ width: 290, minHeight: 460, background: al ? "#0C0C18" : "#0C0C14", border: `1px solid ${al ? al.glow + "45" : "#111827"}`, borderRadius: 12, padding: 18, display: "flex", flexDirection: "column", boxSizing: "border-box" }}>
              {al ? (
                <>
                  <div style={{ fontSize: 8.5, letterSpacing: "0.2em", color: al.glow, textTransform: "uppercase", marginBottom: 4 }}>Camada {al.id} de 7</div>
                  <div style={{ fontSize: 16, fontWeight: 700, color: "#F9FAFB", marginBottom: 3 }}>{al.icon} {al.name}</div>
                  <div style={{ alignSelf: "flex-start", fontSize: 8, color: al.glow, background: al.color + "28", border: `1px solid ${al.glow}30`, borderRadius: 4, padding: "2px 8px", marginBottom: 10 }}>PROTEGE: {al.protects}</div>
                  <div style={{ fontSize: 11, color: "#C9D1D9", lineHeight: 1.8, marginBottom: 10 }}>{al.description}</div>
                  <div style={{ fontSize: 9, color: "#4B5563", background: "#0D1117", borderRadius: 5, padding: "6px 9px", lineHeight: 1.6, borderLeft: `3px solid ${al.glow}40`, marginBottom: 14 }}>{al.example}</div>
                  <div style={{ fontSize: 8, letterSpacing: "0.2em", color: "#374151", textTransform: "uppercase", marginBottom: 7 }}>📚 Para se aprofundar</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 6, flex: 1 }}>
                    {al.resources.map((r, i) => {
                      const tc = TC[r.type] || { bg: "#111827", border: "#374151", text: "#9CA3AF" };
                      return (
                        <a key={i} href={r.url} target="_blank" rel="noopener noreferrer"
                          style={{ display: "flex", alignItems: "center", gap: 7, padding: "7px 9px", background: tc.bg, border: `1px solid ${tc.border}30`, borderRadius: 6, textDecoration: "none" }}>
                          <span style={{ fontSize: 7, color: tc.text, background: tc.border + "20", border: `1px solid ${tc.border}40`, borderRadius: 3, padding: "1px 4px", whiteSpace: "nowrap", flexShrink: 0 }}>{r.type}</span>
                          <span style={{ fontSize: 9.5, color: "#C9D1D9", flex: 1 }}>{r.label}</span>
                          <span style={{ color: "#374151", fontSize: 10 }}>↗</span>
                        </a>
                      );
                    })}
                  </div>
                  <button onClick={() => setActive(null)} style={{ marginTop: 12, background: "transparent", border: "1px solid #1F2937", color: "#374151", fontSize: 9, padding: "5px 10px", borderRadius: 5, cursor: "pointer" }}>← FECHAR</button>
                </>
              ) : (
                <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 10 }}>
                  <div style={{ fontSize: 30 }}>🎯</div>
                  <div style={{ fontSize: 11, color: "#374151", lineHeight: 1.8, textAlign: "center" }}>Clique em qualquer<br />anel do diagrama</div>
                  <div style={{ width: 28, height: 1, background: "#1F2937" }} />
                  {layers.map((l) => (
                    <div key={l.id} onClick={(e) => { e.stopPropagation(); setActive(l.id); }} onMouseEnter={() => setHovered(l.id)} onMouseLeave={() => setHovered(null)}
                      style={{ cursor: "pointer", padding: "5px 10px", borderRadius: 5, fontSize: 10, color: hovered === l.id ? l.glow : "#374151", background: hovered === l.id ? l.color + "20" : "transparent", border: `1px solid ${hovered === l.id ? l.glow + "30" : "transparent"}`, width: "100%", display: "flex", alignItems: "center", gap: 6 }}>
                      {l.icon} {l.name} <span style={{ marginLeft: "auto", fontSize: 8, color: "#1F2937" }}>→</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>

          <div style={{ display: "flex", gap: 12, marginTop: 16, flexWrap: "wrap", justifyContent: "center" }}>
            {Object.entries(TC).map(([t, tc]) => (
              <div key={t} style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 8.5, color: tc.text }}>
                <span style={{ width: 5, height: 5, borderRadius: "50%", background: tc.border, flexShrink: 0 }} />{t}
              </div>
            ))}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
